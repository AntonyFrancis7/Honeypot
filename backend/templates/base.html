<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}College Portal Honeypot{% endblock %}</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 0;
        background: #0b1020;
        color: #e5e7eb;
      }
      header {
        padding: 1rem 2rem;
        background: linear-gradient(90deg, #111827, #1f2937);
        border-bottom: 1px solid #374151;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #9ca3af;
      }
      header span.env-pill {
        border-radius: 999px;
        padding: 0.1rem 0.75rem;
        border: 1px solid #4b5563;
        font-size: 0.75rem;
        color: #d97757;
        background: rgba(15, 23, 42, 0.9);
      }
      main {
        min-height: calc(100vh - 64px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .card {
        background: radial-gradient(circle at top left, #111827, #020617);
        border-radius: 1rem;
        border: 1px solid #1f2937;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.9);
        padding: 2rem;
        width: 100%;
        max-width: 420px;
      }
      .card h2 {
        margin-top: 0;
        margin-bottom: 0.25rem;
        font-size: 1.35rem;
        font-weight: 600;
      }
      .card p.subtitle {
        margin-top: 0;
        margin-bottom: 1.5rem;
        color: #9ca3af;
        font-size: 0.9rem;
      }
      label {
        display: block;
        margin-bottom: 0.35rem;
        font-size: 0.85rem;
        color: #9ca3af;
      }
      input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid #374151;
        background: #020617;
        color: #e5e7eb;
        font-size: 0.9rem;
        outline: none;
      }
      input:focus {
        border-color: #60a5fa;
        box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.4);
      }
      .field {
        margin-bottom: 1rem;
      }
      button {
        width: 100%;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        border: none;
        background: linear-gradient(135deg, #1d4ed8, #2563eb);
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.9rem;
      }
      button:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
      }
      .helper {
        margin-top: 0.75rem;
        font-size: 0.75rem;
        color: #6b7280;
      }
      .error {
        margin-top: 0.75rem;
        font-size: 0.8rem;
        color: #fca5a5;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
        font-size: 0.8rem;
      }
      th,
      td {
        padding: 0.4rem 0.5rem;
        border-bottom: 1px solid #1f2937;
      }
      th {
        text-align: left;
        color: #9ca3af;
        font-weight: 500;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 0.1rem 0.55rem;
        border: 1px solid #374151;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>College Portal</h1>
      <span class="env-pill">Honeypot Environment</span>
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
